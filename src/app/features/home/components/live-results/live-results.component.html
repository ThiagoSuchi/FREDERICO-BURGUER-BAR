<section class="py-48 px-4 relative z-10">
  <app-section-heading title="Resultados ao Vivo" subtitle="Acompanhe a Disputa" />

  <div class="max-w-4xl mx-auto bg-frederico-dark p-8 md:p-12 border-l-4 border-frederico-yellow hard-shadow">
    <div class="flex justify-between items-end mb-8 border-b border-frederico-gray pb-4">
      <h3 class="font-anton text-3xl uppercase">Duelo Principal</h3>
      <div class="flex items-center gap-2 text-frederico-red animate-pulse">
        <div class="w-3 h-3 rounded-full bg-frederico-red"></div>
        <span class="font-inter font-bold text-sm uppercase tracking-wider">
          Live
        </span>
      </div>
    </div>

    <div class="space-y-8">
      <div *ngFor="let item of results" class="relative">
        <div class="flex justify-between items-end mb-2">
          <div class="flex items-center gap-3">
            <ng-container [ngSwitch]="item.name">
              <img *ngSwitchCase="'Brasil'" src="assets/icons/brasil.png" alt="Brasil" class="w-8 h-8 object-contain" />
              <img *ngSwitchCase="'Argentina'" src="assets/icons/argentina.png" alt="Argentina" class="w-8 h-8 object-contain" />
              <img *ngSwitchCase="'EUA'" src="assets/icons/estados-unidos.png" alt="EUA" class="w-8 h-8 object-contain" />
              <img *ngSwitchCase="'França'" src="assets/icons/franca.png" alt="França" class="w-8 h-8 object-contain" />
              <img *ngSwitchCase="'Japão'" src="assets/icons/japao.png" alt="Japão" class="w-8 h-8 object-contain" />
              <span *ngSwitchDefault class="text-3xl">{{ item.flag }}</span>
            </ng-container>
            <span class="font-anton text-2xl uppercase">
              {{ item.name }}
            </span>
          </div>
          <div class="text-right">
            <span class="font-anton text-3xl text-frederico-yellow">
              {{ item.percentage }}%
            </span>
            <p class="font-inter text-sm text-gray-400">
              {{ item.votes.toLocaleString() }} votos
            </p>
          </div>
        </div>

        <!-- Fundo da barra de progresso -->
        <div class="h-6 w-full bg-frederico-black rounded-full overflow-hidden -skew-x-12 border border-frederico-gray">
          <!-- Preenchimento da barra de progresso -->
          <div [ngClass]="item.color" [style.width.%]="item.percentage"
            class="h-full relative transition-all duration-1500">
            <!-- Efeito de brilho -->
            <div class="absolute top-0 left-0 right-0 h-1/2 bg-white/20"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
