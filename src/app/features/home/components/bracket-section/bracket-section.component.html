<section class="py-48 px-4 relative z-10 bg-frederico-black/90 overflow-hidden border-y border-white/5">
  <!-- Decoracao das linhas do campo -->
  <div class="absolute inset-x-0 top-1/2 h-px bg-frederico-yellow/15"></div>
  <div class="absolute left-1/2 top-0 bottom-0 w-px bg-frederico-yellow/15 hidden md:block"></div>

  <app-section-heading title="Chaveamento" subtitle="O Caminho para a Glória" className="mb-32 md:mb-36" />

  <div>
    <!-- Layout principal do torneio -->
    <div class="flex flex-col md:flex-row items-start justify-center lg:gap-12 min-h-[500px]">
      <!-- ALA ESQUERDA (7 cards) -->
      <div class="flex items-center gap-12 md:gap-14 md:w-auto">
        <!-- Oitavas esquerda -->
        <div class="flex flex-col gap-8 relative">
          <div *ngFor="let match of r4.slice(0, 2); let i = index"
            class="w-48 md:w-52 lg:w-60 bg-frederico-dark/40 border border-white/20 hover:border-frederico-yellow/50 transition-all duration-500 shadow-md relative group">
            <div class="py-3.5">
              <app-team-row [team]="match.team1" [isWinner]="match.winner === 1"
                [isLoser]="match.winner === 2"></app-team-row>
              <app-team-row [team]="match.team2" [isWinner]="match.winner === 2"
                [isLoser]="match.winner === 1"></app-team-row>
              <app-team-row [team]="match.team3" [isWinner]="match.winner === 2"
                [isLoser]="match.winner === 1"></app-team-row>
            </div>
            <!-- Conector para quartas -->
            <div *ngIf="i % 2 === 0"
              class="absolute left-full -ml-px top-1/2 w-12 lg:w-14 h-px bg-frederico-yellow/30 pointer-events-none">
            </div>
            <div *ngIf="i % 2 === 1"
              class="absolute left-full -ml-px bottom-1/2 w-12 lg:w-14 h-px bg-frederico-yellow/30 pointer-events-none">
            </div>
          </div>
        </div>

        <!-- Quartas esquerda -->
        <div class="flex flex-col items-center gap-7 relative">
          <div
            class="absolute -top-7 left-1/2 -translate-x-1/2 text-xs md:text-sm font-anton text-frederico-yellow uppercase tracking-widest z-10 flex items-center gap-1 whitespace-nowrap">
            <span class="w-1.5 h-1.5 rounded-full bg-frederico-yellow animate-pulse"></span>
            Semifinal 1
          </div>
          <div *ngFor="let match of sf.slice(0, 2); let i = index"
            class="w-48 md:w-52 lg:w-60 bg-frederico-dark/60 border border-white/30 hover:border-frederico-yellow/60 transition-all duration-500 shadow-lg relative group">
            <div class="py-3.5">
              <app-team-row [team]="match.team1" [isWinner]="match.winner === 1"
                [isLoser]="match.winner === 2"></app-team-row>
              <app-team-row [team]="match.team2" [isWinner]="match.winner === 2"
                [isLoser]="match.winner === 1"></app-team-row>
            </div>
            <!-- Conector para semifinal -->
            <div class="absolute left-full -ml-px top-1/2 w-12 lg:w-14 pointer-events-none"
              [ngClass]="i === 0 ? 'h-[132px]' : 'bottom-1/2 top-auto h-[132px]'">
              <div [ngClass]="i === 0 ? 'absolute left-0 top-0 h-px w-full bg-frederico-yellow/30' : 'absolute left-0 bottom-0 h-px w-full bg-frederico-yellow/30'"></div>
              <div [ngClass]="i === 0 ? 'absolute right-0 top-0 h-full w-px bg-frederico-yellow/30' : 'absolute right-0 bottom-0 h-full w-px bg-frederico-yellow/30'"></div>
              <div [ngClass]="i === 0 ? 'absolute right-0 top-0 h-2.5 w-2.5 border-r border-t border-frederico-yellow/30' : 'absolute right-0 bottom-0 h-2.5 w-2.5 border-r border-b border-frederico-yellow/30'"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Centro (Grande Final) -->
      <div
        class="w-full md:w-auto flex flex-col order-1 md:order-2 pt-0 md:py-0 px-4 lg:px-12 self-start">
        <div class="relative z-30 scale-110 md:scale-[1.2] lg:scale-[1.4] -mt-1">
          <!-- Coroa flutuante -->
          <div class="flex justify-center mb-4 animate-float">
            <span
              class="material-symbols-outlined text-7xl text-frederico-yellow trophy-glow drop-shadow-[0_0_25px_rgba(255,214,10,0.7)]">
              crown
            </span>
          </div>

          <div class="absolute -inset-20 bg-white/5 blur-[120px] rounded-full pointer-events-none opacity-50"></div>

          <div class="relative w-64 bg-frederico-yellow p-[2px] shadow-2xl">
            <div class="bg-frederico-black border border-frederico-yellow">
              <div class="bg-frederico-yellow text-frederico-black text-center py-1">
                <span class="font-anton text-[9px] uppercase tracking-[0.5em] font-bold">The Grand Final</span>
              </div>
              <div class="py-4">
                <app-team-row [team]="final[0].team1" [isWinner]="true" [isLoser]="false"></app-team-row>
                <div class="flex items-center gap-3 px-3 my-2 text-frederico-yellow/50">
                  <div class="flex-1 h-px bg-frederico-yellow/20"></div>
                  <span class="font-anton text-xl italic">VS</span>
                  <div class="flex-1 h-px bg-frederico-yellow/20"></div>
                </div>
                <app-team-row [team]="final[0].team2" [isWinner]="false" [isLoser]="false"></app-team-row>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
