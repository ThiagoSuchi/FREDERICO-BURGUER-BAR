
    <section class="py-48 bg-frederico-black relative section-glow">
      <div class="container mx-auto px-4">
        <app-section-heading title="Como Funciona" subtitle="Regras do Jogo" />

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 max-w-6xl mx-auto mt-16">
          <div
            *ngFor="let step of steps; let idx = index"
            class="bg-[#111111] p-8 border border-white/5 hover:border-frederico-yellow transition-all duration-300 group relative overflow-hidden h-full"
          >
            <div class="absolute -right-4 -top-4 text-9xl font-anton text-white/[0.08] group-hover:text-frederico-yellow/[0.15] transition-colors duration-300 pointer-events-none">
              {{ idx + 1 }}
            </div>
            
            <div class="text-frederico-yellow mb-6">
              <div [ngSwitch]="step.icon">
                <svg *ngSwitchCase="'users'" class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                </svg>
                <svg *ngSwitchCase="'check'" class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <svg *ngSwitchCase="'fire'" class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M11.5 2C11.5 2 11.5 6 9.5 8C7.5 10 5.5 12 5.5 15.5C5.5 19.0883 8.41168 22 12 22C15.5883 22 18.5 19.0883 18.5 15.5C18.5 11.5 14.5 9 14.5 9C14.5 9 15.5 11 15.5 12.5C15.5 14 14.5 15 13.5 15C12.5 15 12.5 14 12.5 13C12.5 12 13.5 10 13.5 10C12.5 10 11.5 8.5 11.5 7.5c0-1 0-5.5 0-5.5z" />
                </svg>
                <svg *ngSwitchCase="'trophy'" class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 18.75h-9m9 0a3 3 0 013 3h-15a3 3 0 013-3m9 0v-3.375c0-.621-.503-1.125-1.125-1.125h-.871M7.5 18.75v-3.375c0-.621.504-1.125 1.125-1.125h.872m5.007 0V9.457c0-.621-.504-1.125-1.125-1.125h-.172M10.5 11.25V9.457c0-.621.504-1.125 1.125-1.125h.172M8.625 8.25h6.75A1.125 1.125 0 0016.5 7.125V3.375a1.125 1.125 0 00-1.125-1.125h-6.75A1.125 1.125 0 007.5 3.375v3.75a1.125 1.125 0 001.125 1.125z" />
                </svg>
              </div>
            </div>

            <h3 class="font-anton text-2xl text-white mb-4 uppercase">
              {{ step.title }}
            </h3>
            
            <p class="text-gray-400 font-inter leading-relaxed">
              {{ step.desc }}
            </p>
          </div>
        </div>
      </div>
    </section>
