
    <section class="relative min-h-[140vh] flex flex-col items-center pt-24 pb-48 px-4 z-10 overflow-hidden">
      <!-- Massive FREDERICO Background Text -->
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0" aria-hidden="true">
        <span class="font-bungee text-[22vw] leading-none text-white/5 tracking-tighter select-none whitespace-nowrap">
          FREDERICO
        </span>
      </div>

      <!-- Top Branding Section -->
      <div class="relative z-20 flex flex-col items-center gap-8 mb-32 w-full">
        <!-- World Cup Logo -->
        <div class="w-16 md:w-20 opacity-40 hover:opacity-60 transition-all duration-500">
          <img 
            src="assets/Logo_copa_2026.png" 
            alt="FIFA 2026" 
            class="w-full h-auto brightness-200 drop-shadow-[0_0_15px_#FFD60A]"
          />
        </div>

        <!-- MAIN BRANDING: FREDERICO BURGER -->
        <div class="text-center group relative">
          <h1 class="font-bungee text-white tracking-tighter transition-all duration-500">
            <!-- Primary Layer -->
            <span class="relative z-10 text-7xl font-bold md:text-[150px] leading-[0.75]">
              FREDERICO
            </span>
            <br />
            <!-- Tag Style Subtitle -->
            <span class="relative z-10 inline-block mt-4 px-6 py-1 bg-frederico-yellow text-black text-2xl md:text-5xl tracking-[0.2em] font-black -rotate-2">
              BURGER BAR
            </span>
          </h1>
          
          <!-- <div class="flex items-center justify-center gap-4 mt-12">
            <div class="h-[2px] w-12 bg-frederico-yellow"></div>
            <span class="font-anton text-2xl tracking-[0.3em] text-frederico-yellow uppercase">Street Food Culture</span>
            <div class="h-[2px] w-12 bg-frederico-yellow"></div>
          </div> -->
        </div>
        
        <!-- Tournament Badge (Secondary) -->
        <div class="mt-8 flex items-center gap-3 bg-white/5 backdrop-blur-sm border border-white/10 px-8 py-3 rounded-full">
          <span class="font-inter text-xs md:text-sm uppercase tracking-[0.4em] text-white/60">
            Apresenta | <span class="text-white">Copa dos Hambúrgueres</span>
          </span>
        </div>
      </div>

      <!-- Main Title (Reduced) -->
      <div class="text-center mb-32 relative z-20">
        <div class="inline-flex items-center gap-8">
          <div class="h-px w-24 bg-frederico-yellow/30"></div>
          <span class="font-anton text-4xl md:text-6xl text-white/20 tracking-[0.2em] uppercase italic">
            World Cup Edition 2026
          </span>
          <div class="h-px w-24 bg-frederico-yellow/30"></div>
        </div>
      </div>

      <!-- VS Section -->
      <div class="w-full max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-center gap-16 md:gap-32 relative z-20 mb-24">
        <!-- Burger 1 - Brazil -->
        <div class="flex flex-col items-center relative group">
          <div class="relative w-72 h-72 md:w-[450px] md:h-[450px] rounded-full bg-frederico-yellow/5 flex items-center justify-center mb-8">
            <div class="absolute inset-0 rounded-full border border-frederico-yellow/30 scale-105"></div>
            <img
              src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=800&q=80"
              alt="Brazil Burger"
              class="w-full h-full object-cover rounded-full burger-spotlight transition-all duration-500 shadow-[0_0_50px_rgba(255,214,10,0.2)]"
            />
          </div>
          <div class="bg-frederico-black/90 px-10 py-3 -skew-x-12 border border-white/10 shadow-2xl">
            <div class="flex items-center gap-4 skew-x-12">
              <img src="assets/icons/brasil.png" alt="Brasil" class="w-6 h-6 object-contain" />
              <span class="font-anton text-3xl md:text-4xl uppercase text-white">
                O Brabo
              </span>
            </div>
          </div>
        </div>

        <!-- VS Badge -->
        <div class="z-30">
          <div class="animate-vs-spring text-6xl md:text-9xl font-anton text-frederico-red italic z-20 drop-shadow-[0_0_25px_rgba(239,68,68,0.8)]">
            VS
          </div>
        </div>

        <!-- Burger 2 - Argentina -->
        <div class="flex flex-col items-center relative group">
          <div class="relative w-72 h-72 md:w-[450px] md:h-[450px] rounded-full bg-white/5 flex items-center justify-center mb-8">
            <div class="absolute inset-0 rounded-full border border-white/10 scale-105"></div>
            <img
              src="https://images.unsplash.com/photo-1586816001966-79b736744398?auto=format&fit=crop&w=800&q=80"
              alt="Argentina Burger"
              class="w-full h-full object-cover rounded-full burger-spotlight transition-all duration-500 shadow-[0_0_50px_rgba(255,255,255,0.1)]"
            />
          </div>
          <div class="bg-frederico-black/90 px-10 py-3 -skew-x-12 border border-white/10 shadow-2xl">
            <div class="flex items-center gap-4 skew-x-12">
              <img src="assets/icons/argentina.png" alt="Argentina" class="w-6 h-6 object-contain" />
              <span class="font-anton text-3xl md:text-4xl uppercase text-white">
                El Pibe
              </span>
            </div>
          </div>
        </div>
      </div>

      <!-- CTA -->
      <div class="z-20 mt-8 mb-12 animate-in fade-in slide-in-from-bottom-5 duration-1000 delay-500 fill-mode-both">
        <app-button
          (click)="scrollToMatchups()"
        >
          VOTAR AGORA
        </app-button>
      </div>

      <!-- Scroll Indicator -->
      <div class="mt-8 flex flex-col items-center opacity-30">
        <span class="font-inter text-[10px] uppercase tracking-[0.5em] mb-4 text-white">
          Role para os detalhes
        </span>
        <div class="w-px h-16 bg-gradient-to-b from-frederico-yellow to-transparent"></div>
      </div>
    </section>
