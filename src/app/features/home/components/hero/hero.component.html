<section
  class="relative min-h-[140vh] flex flex-col items-center pt-20 md:pt-24 pb-40 md:pb-48 px-4 z-10 overflow-hidden">
  <!-- Texto de fundo FREDERICO gigante -->
  <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0" aria-hidden="true">
    <span class="font-bungee text-[22vw] leading-none text-white/5 tracking-tighter select-none whitespace-nowrap">
      FREDERICO
    </span>
  </div>

  <!-- Faixa diagonal com a logo da Copa -->
  <div class="absolute top-15 md:top-16 left-1/2 -translate-x-1/2 w-[130%] z-40 pointer-events-none" aria-hidden="true">
    <div
      class="-rotate-[6deg] h-16 md:h-19 bg-gradient-to-r from-frederico-yellow via-frederico-red to-frederico-yellow shadow-[0_18px_40px_rgba(0,0,0,0.35)]">
      <div class="h-full flex items-center justify-center gap-4 md:gap-6">
        <img src="assets/images/hero/Logo_copa_2026.png" alt="FIFA 2026" class="h-20 md:h-14 w-auto" />
        <div class="h-4 md:h-5 w-px bg-frederico-black/50"></div>
        <span class="font-anton text-[11px] md:text-sm tracking-[0.45em] uppercase text-frederico-black/80">
          World Cup 2026
        </span>
      </div>
    </div>
  </div>

  <!-- Secao de marca principal -->
  <div class="relative z-10 flex flex-col items-center gap-12 md:gap-14 mb-36 md:mb-40 w-full">
    <!-- Marca principal: Frederico Burger -->
    <div>
      <div
        class="relative inline-flex items-center justify-center rounded-2xl p-[2px] bg-gradient-to-r from-frederico-yellow/70 via-frederico-red/40 to-frederico-yellow/70">
        <div
          class="relative inline-flex justify-center rounded-[18px] bg-frederico-black/85 px-6 py-4 md:px-10 md:py-6 border border-white/10 shadow-[0_18px_40px_rgba(0,0,0,0.35)]">
          <div
            class="absolute -inset-x-12 top-40 -translate-y-1/2 h-12 -skew-x-12 bg-gradient-to-r from-frederico-yellow/25 via-frederico-red/20 to-frederico-yellow/25 opacity-70">
          </div>
          <img src="assets/images/brand/Frederico_horizontal.png" alt="Frederico Burger Bar"
            class="relative w-[260px] sm:w-[340px] top-6 md:w-[520px] lg:w-[640px] h-auto transition-all duration-500 drop-shadow-[0_12px_26px_rgba(0,0,0,0.45)]" />
        </div>
      </div>
    </div>

    <!-- Selo do torneio (secundario) -->
    <div class="mt-8 flex items-center gap-3 bg-white/5 backdrop-blur-sm border border-white/10 px-8 py-3 rounded-full">
      <span class="font-inter text-xs md:text-sm uppercase tracking-[0.4em] text-white/60">
        Apresenta | <span class="text-white">Copa dos Hambúrgueres</span>
      </span>
    </div>
  </div>

  <!-- Titulo principal (reduzido) -->
  <!-- <div class="text-center mb-32 md:mb-36 relative z-20">
    <div class="inline-flex items-center gap-8">
      <div class="h-px w-24 bg-frederico-yellow/30"></div>
      <span class="font-anton text-4xl md:text-6xl text-white/25 tracking-[0.2em] uppercase italic">
        World Cup Edition 2026
      </span>
      <div class="h-px w-24 bg-frederico-yellow/30"></div>
    </div>
  </div> -->

  <!-- Secao VS -->
  <div
    class="w-full max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-center gap-16 md:gap-32 relative z-20 mb-24">
    <!-- Hamburguer 1 - Brasil -->
    <div class="flex flex-col items-center relative group">
      <div
        class="relative w-72 h-72 md:w-[450px] md:h-[450px] rounded-full bg-frederico-yellow/5 flex items-center justify-center mb-8">
        <div class="absolute inset-0 rounded-full border border-frederico-yellow/30 scale-105"></div>
        <img src="assets/images/hambgurgers/Brasil.jpeg"
          alt="Brasil Burger"
          class="w-full h-full object-cover rounded-full burger-spotlight transition-all duration-500 shadow-[0_0_50px_rgba(255,214,10,0.2)]" />
      </div>
      <div class="bg-frederico-black/90 px-10 py-3 -skew-x-12 border border-white/10 shadow-2xl">
        <div class="flex items-center gap-4 skew-x-12">
          <img src="assets/icons/brasil.png" alt="Brasil" class="w-6 h-6 object-contain" />
          <span class="font-anton text-3xl md:text-4xl uppercase text-white">
            Brasil
          </span>
        </div>
      </div>
    </div>

    <!-- Selo VS -->
    <div class="z-30">
      <div
        class="animate-vs-spring text-6xl md:text-9xl font-anton text-frederico-red italic z-20 drop-shadow-[0_0_25px_rgba(239,68,68,0.8)]">
        VS
      </div>
    </div>

    <!-- Hamburguer 2 - Argentina -->
    <div class="flex flex-col items-center relative group">
      <div
        class="relative w-72 h-72 md:w-[450px] md:h-[450px] rounded-full bg-white/5 flex items-center justify-center mb-8">
        <div class="absolute inset-0 rounded-full border border-white/10 scale-105"></div>
        <img src="assets/images/hambgurgers/Argentina.jpeg"
          alt="Argentina Burger"
          class="w-full h-full object-cover rounded-full burger-spotlight transition-all duration-500 shadow-[0_0_50px_rgba(255,255,255,0.1)]" />
      </div>
      <div class="bg-frederico-black/90 px-10 py-3 -skew-x-12 border border-white/10 shadow-2xl">
        <div class="flex items-center gap-4 skew-x-12">
          <img src="assets/icons/argentina.png" alt="Argentina" class="w-6 h-6 object-contain" />
          <span class="font-anton text-3xl md:text-4xl uppercase text-white">
            Argentina
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- Chamada para acao -->
  <div class="z-20 mt-8 mb-12 animate-in fade-in slide-in-from-bottom-5 duration-1000 delay-500 fill-mode-both">
    <app-button (click)="scrollToMatchups()">
      VOTAR AGORA
    </app-button>
  </div>

  <!-- Indicador de rolagem -->
  <div class="mt-8 flex flex-col items-center opacity-30">
    <span class="font-inter text-[10px] uppercase tracking-[0.5em] mb-4 text-white">
      Role para os detalhes
    </span>
    <div class="w-px h-16 bg-gradient-to-b from-frederico-yellow to-transparent"></div>
  </div>
</section>
